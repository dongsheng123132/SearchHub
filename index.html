<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SearchHub - One Search, All Results</title>
  <link rel="stylesheet" href="styles/index.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <h1>SearchHub</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn lang-toggle" id="langToggle" title="Switch Language / 切换语言">
          <span id="langText">EN</span>
        </button>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="compactModeBtn" title="Compact mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
        <button class="icon-btn" id="editModeBtn" title="Edit mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m-6-6h6m6 0h-6M4.22 4.22l4.24 4.24m7.08 7.08 4.24 4.24M4.22 19.78l4.24-4.24m7.08-7.08 4.24-4.24"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search Section -->
    <div class="search-section">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input
          type="text"
          id="searchInput"
          placeholder="Search anything across all engines..."
          autocomplete="off"
        >
        <button class="clear-btn" id="clearBtn" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Quick Combos -->
      <div class="quick-combos" id="quickCombos">
        <!-- Will be populated by JS -->
      </div>
    </div>

    <!-- Categories -->
    <div class="categories-container" id="categoriesContainer">
      <!-- Will be populated by JS -->
    </div>

    <!-- Search Button -->
    <div class="search-action">
      <button class="search-btn" id="searchBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span>Search</span>
      </button>
      <div class="selected-count" id="selectedCount">0 engines selected</div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>Press <kbd>Alt+S</kbd> to open • <kbd>Alt+Q</kbd> to search selected text</p>
    </footer>
  </div>

  <script src="scripts/config.js"></script>
  <script src="scripts/i18n.js"></script>
  <script src="scripts/index.js"></script>
</body>
</html>
