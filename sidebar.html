<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SearchHub Sidebar</title>
  <link rel="stylesheet" href="styles/sidebar.css">
</head>
<body>
  <div class="sidebar-container">
    <!-- Header -->
    <div class="sidebar-header">
      <h2 data-i18n="verticalTabs">Vertical Tabs</h2>
      <div class="header-actions">
        <button class="icon-btn" id="collapseAllBtn" title="Collapse All Groups" data-i18n-title="collapseAll">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
        <button class="icon-btn" id="refreshBtn" title="Refresh" data-i18n-title="refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="1 4 1 10 7 10"></polyline>
            <polyline points="23 20 23 14 17 14"></polyline>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search Info -->
    <div class="search-info" id="searchInfo" style="display: none;">
      <div class="info-content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span id="searchQuery"></span>
      </div>
    </div>

    <!-- Tabs List (包含分组和未分组的标签) -->
    <div class="tabs-list" id="tabsList">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="9" x2="15" y2="9"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <p data-i18n="noTabs">No tabs yet</p>
        <small data-i18n="openSomeTabs">Open some tabs to see them here</small>
      </div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="btn-full" id="openSearchHub">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span data-i18n="openSearchHubBtn">Open SearchHub</span>
      </button>
    </div>
  </div>

  <script src="scripts/i18n.js"></script>
  <script src="scripts/sidebar.js"></script>
</body>
</html>
